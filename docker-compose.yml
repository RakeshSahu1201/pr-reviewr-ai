version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pr_reviewer}
      POSTGRES_USER: ${POSTGRES_USER:-mr_reviewer_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pr_reviewer}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mr_reviewer_app -d pr_reviewer"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pr_reviewer}
      POSTGRES_USER: ${POSTGRES_USER:-mr_reviewer_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pr_reviewer}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-https://gitlab.com}
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8080}:8080"

volumes:
  pgdata:

networks:
  nginx-proxy-network:
    external: true
